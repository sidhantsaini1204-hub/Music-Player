<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - Music Player</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- sidebar -->
    <div class="sidebar">

        <h2>🎵 Music Player</h2>

        <ul>
            <li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="playlist.html"><i class="fas fa-list"></i> Playlist</a></li>
            <li><a href="albums.html"><i class="fas fa-compact-disc"></i> Albums</a></li>
            <li><a href="songs.html"><i class="fas fa-music"></i> Songs</a></li>
            <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
        </ul>

    </div>

    <!-- main content -->
    <div class="main-content">

        <!-- page header -->
        <section class="page-header">
            <h1>🎶 My Playlists</h1>
            
            <p>Manage and enjoy your favorite music collections.</p>
        </section>

        
        <!-- 6 playlist sections given -->
        
        <div class="playlist-grid">

            <div class="playlist-card">
                <i class="fas fa-heart"></i>
                <h3>Liked Songs</h3>
                <p>45 Songs</p>
                <button>Open Playlist</button>
            </div>

            <div class="playlist-card">
                <i class="fas fa-fire"></i>
                <h3>Trending Hits</h3>
                <p>30 Songs</p>
                <button>Open Playlist</button>
            </div>

            <div class="playlist-card">
                <i class="fas fa-moon"></i>
                <h3>Night Vibes</h3>
                <p>25 Songs</p>
                <button>Open Playlist</button>
            </div>

            <div class="playlist-card">
                <i class="fas fa-dumbbell"></i>
                <h3>Workout Mix</h3>
                <p>35 Songs</p>
                <button>Open Playlist</button>
            </div>

            <div class="playlist-card">
                <i class="fas fa-car"></i>
                <h3>Road Trip</h3>
                <p>20 Songs</p>
                <button>Open Playlist</button>
            </div>

            <div class="playlist-card">
                <i class="fas fa-star"></i>
                <h3>Top Picks</h3>
                <p>50 Songs</p>
                <button>Open Playlist</button>
            </div>

        </div>

    </div>

</body>
</html>
